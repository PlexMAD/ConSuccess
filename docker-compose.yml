services:
  db:
    image: postgres:17-alpine
    container_name: consuccess-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: consuccess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consuccess"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./Backend
    container_name: consuccess-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/consuccess?schema=public
      JWT_SECRET: change-this-secret
      PORT: "5000"
      FRONTEND_ORIGIN: http://localhost:3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/universities').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./Frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: consuccess-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://backend:5000
      NEXT_PUBLIC_API_URL: http://localhost:5000
      COOKIE_SECURE: "false"
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
